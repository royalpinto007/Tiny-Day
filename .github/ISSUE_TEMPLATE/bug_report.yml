name: Bug report
description: Report a reproducible problem in Tiny Day
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Tiny Day. Please remove personal task data from screenshots and logs.
  - type: input
    id: version
    attributes:
      label: Tiny Day version
      placeholder: v1.0.0
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and operating system
      placeholder: Pixel 8, Android 16
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Explain what you saw and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Every time
        - Sometimes
        - Once
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add privacy-safe screenshots, recordings, or logs if useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed personal planning data from anything attached.
          required: true
